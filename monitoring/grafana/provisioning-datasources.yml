# =============================================================================
# BRCloud FluxGate - Grafana Datasource Provisioning
# =============================================================================
# Copier vers /etc/grafana/provisioning/datasources/fluxgate.yml
# =============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://127.0.0.1:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: "15s"
