# =============================================================================
# BRCloud FluxGate - OWASP CRS Override / Tuning
# =============================================================================
# Ce fichier est charge APRES crs-setup.conf pour personnaliser le CRS.
# Copier vers /etc/modsecurity/crs/crs-setup-override.conf
# et inclure dans modsecurity.conf apres crs-setup.conf.
# =============================================================================

# --- Paranoia Level ---
# Niveau 1 : regles de base (moins de faux positifs)
# Niveau 2 : regles supplementaires (recommande en production apres tuning)
# Niveau 3-4 : tres restrictif (nombreux faux positifs possibles)
SecAction "id:900000,phase:1,pass,nolog,setvar:tx.blocking_paranoia_level=1"

# --- Detection Paranoia Level (pour logging sans bloquer) ---
SecAction "id:900001,phase:1,pass,nolog,setvar:tx.detection_paranoia_level=2"

# --- Seuil d'anomalie (scoring mode) ---
# Requete bloquee si score >= seuil
SecAction "id:900110,phase:1,pass,nolog,setvar:tx.inbound_anomaly_score_threshold=5"
SecAction "id:900111,phase:1,pass,nolog,setvar:tx.outbound_anomaly_score_threshold=4"

# --- Exclure certains chemins du WAF (health checks, monitoring) ---
SecRule REQUEST_URI "@beginsWith /health" \
    "id:900200,phase:1,pass,nolog,ctl:ruleEngine=Off"

SecRule REQUEST_URI "@beginsWith /nginx_status" \
    "id:900201,phase:1,pass,nolog,ctl:ruleEngine=Off"

SecRule REQUEST_URI "@beginsWith /server-status" \
    "id:900202,phase:1,pass,nolog,ctl:ruleEngine=Off"

# --- Exclusions pour faux positifs connus (a adapter selon votre app) ---
# Exemple : exclure un parametre specifique de la detection SQLi
# SecRuleUpdateTargetById 942100 "!ARGS:mon_parametre_safe"

# --- Rate limiting basique via ModSecurity (complement NGINX/nftables) ---
# Compter les requetes par IP dans une fenetre de 60 secondes
SecAction "id:900300,phase:1,pass,nolog,initcol:ip=%{REMOTE_ADDR}"

# Incrementer le compteur (avant la verification)
SecAction "id:900301,phase:1,pass,nolog,setvar:ip.request_count=+1"

# Reset toutes les 60 secondes
SecAction "id:900302,phase:1,pass,nolog,expirevar:ip.request_count=60"

# Verifier le seuil (apres increment)
SecRule IP:REQUEST_COUNT "@gt 100" \
    "id:900303,phase:1,deny,status:429,msg:'WAF rate limit exceeded',logdata:'%{IP:REQUEST_COUNT} requests'"
