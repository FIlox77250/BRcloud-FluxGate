# =============================================================================
# BRCloud FluxGate - ModSecurity v3 Configuration
# =============================================================================
# Configuration principale du moteur WAF ModSecurity.
#
# Pre-requis :
#   - libmodsecurity3 (v3.0.14+)
#   - Connecteur NGINX (modsecurity-nginx v1.0.4) ou Apache (mod_security2 v2.9.x)
#   - OWASP Core Rule Set (CRS v4.x)
#
# Installation NGINX :
#   1. Compiler/installer libmodsecurity3
#   2. Compiler/installer modsecurity-nginx connector
#   3. Dans nginx.conf : modsecurity on; modsecurity_rules_file /path/to/modsecurity.conf;
#
# Installation Apache :
#   IMPORTANT : Le connecteur ModSecurity v3 pour Apache n'est PAS production-ready.
#   Utiliser mod_security2 (v2.9.x) pour Apache.
#   Dans httpd.conf : LoadModule security2_module modules/mod_security2.so
# =============================================================================

# --- Moteur ModSecurity ---
# On           = bloquer les requetes matchees
# DetectionOnly = logger sans bloquer (mode audit/tuning)
SecRuleEngine On

# --- Traitement du body de la requete ---
SecRequestBodyAccess On
SecRequestBodyLimit 10485760
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

# --- Traitement du body de la reponse (optionnel, cout CPU) ---
SecResponseBodyAccess Off

# --- Fichiers temporaires ---
SecTmpDir /tmp/modsecurity/tmp/
SecDataDir /tmp/modsecurity/data/

# --- Audit logging ---
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/modsecurity/modsec_audit.log

# --- Debug log (desactiver en production) ---
SecDebugLog /var/log/modsecurity/modsec_debug.log
SecDebugLogLevel 0

# --- Formats ---
SecArgumentSeparator &
SecCookieFormat 0

# --- Unicode mapping ---
SecUnicodeMapFile /etc/modsecurity/unicode.mapping 20127

# --- Actions par defaut ---
# SecDefaultAction "phase:1,deny,log,status:403"

# --- Regles de base (avant CRS) ---

# Bloquer les requetes sans Host header
SecRule REQUEST_HEADERS:Host "^$" \
    "id:10001,phase:1,deny,status:400,msg:'Missing Host header'"

# Bloquer les methodes HTTP dangereuses
SecRule REQUEST_METHOD "^(TRACE|TRACK|OPTIONS)" \
    "id:10002,phase:1,deny,status:405,msg:'Method not allowed'"

# Limiter la taille des cookies
SecRule REQUEST_HEADERS:Cookie "@gt 4096" \
    "id:10003,phase:1,deny,status:400,msg:'Cookie too large'"

# =============================================================================
# Charger OWASP Core Rule Set (CRS)
# =============================================================================
# Adapter les chemins selon votre installation.
# CRS v4.x recommande.
Include /etc/modsecurity/crs/crs-setup.conf
Include /etc/modsecurity/crs/rules/*.conf
