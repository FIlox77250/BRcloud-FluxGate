# =============================================================================
# BRCloud FluxGate - Kernel Sysctl Hardening (Anti-DDoS)
# =============================================================================
# Copier vers /etc/sysctl.d/99-fluxgate-hardening.conf
# Appliquer : sysctl --system
#
# Chaque parametre est documente. Adapter les valeurs selon le profil trafic.
# =============================================================================

# -----------------------------------------------------------------------------
# SYN Cookies - Protection SYN Flood
# -----------------------------------------------------------------------------
# Active le mecanisme de SYN cookies : reponse SYN/ACK stateless,
# creation d'etat seulement a la reception de l'ACK final.
# ATTENTION : mecanisme de secours, pas un substitut a un backlog bien dimensionne.
net.ipv4.tcp_syncookies = 1

# -----------------------------------------------------------------------------
# Backlog TCP - Files d'attente SYN
# -----------------------------------------------------------------------------
# Taille max de la file SYN_RECV (half-open connections)
net.ipv4.tcp_max_syn_backlog = 8192

# Taille max de la file d'ecoute des sockets (listen backlog)
net.core.somaxconn = 4096

# -----------------------------------------------------------------------------
# Conntrack - Suivi de connexions
# -----------------------------------------------------------------------------
# Nombre max d'entrees conntrack (adapter selon RAM disponible)
# Chaque entree ~300 octets, 262144 entrees ~ 75 Mo
net.netfilter.nf_conntrack_max = 262144

# Nombre de buckets hash (idealement nf_conntrack_max / 4)
# Note : modifiable seulement au chargement du module ou via sysfs
# net.netfilter.nf_conntrack_buckets = 65536

# Timeout pour les connexions TCP etablies (defaut ~432000 = 5 jours)
# Reduire pour liberer les entrees plus vite sous charge
net.netfilter.nf_conntrack_tcp_timeout_established = 86400

# Timeout SYN_SENT (defaut 120s)
net.netfilter.nf_conntrack_tcp_timeout_syn_sent = 30

# Timeout SYN_RECV (defaut 60s)
net.netfilter.nf_conntrack_tcp_timeout_syn_recv = 30

# Timeout FIN_WAIT (defaut 120s)
net.netfilter.nf_conntrack_tcp_timeout_fin_wait = 30

# Timeout TIME_WAIT (defaut 120s)
net.netfilter.nf_conntrack_tcp_timeout_time_wait = 30

# Timeout CLOSE_WAIT
net.netfilter.nf_conntrack_tcp_timeout_close_wait = 15

# Desactiver le mode "loose" pour conntrack TCP (recommande si SYNPROXY utilise)
net.netfilter.nf_conntrack_tcp_loose = 0

# -----------------------------------------------------------------------------
# Durcissement reseau general
# -----------------------------------------------------------------------------
# Desactiver la reponse aux broadcasts ICMP (Smurf amplification)
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignorer les messages ICMP errones
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Activer le filtrage par chemin inverse (anti-spoofing, BCP 38 local)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Desactiver le routage source (securite)
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# Desactiver les redirections ICMP (securite)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Desactiver l'acceptation des Router Advertisements (RA) - protection Rogue RA
# A decommenter si votre serveur utilise une adresse IPv6 statique (recommande).
# net.ipv6.conf.all.accept_ra = 0
# net.ipv6.conf.default.accept_ra = 0

# Log les paquets "martiens" (IP source invalide)
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# -----------------------------------------------------------------------------
# Buffers reseau - Optimisation debit
# -----------------------------------------------------------------------------
# Taille max du buffer de reception (par socket)
net.core.rmem_max = 16777216
net.core.rmem_default = 1048576

# Taille max du buffer d'emission (par socket)
net.core.wmem_max = 16777216
net.core.wmem_default = 1048576

# Buffer TCP auto-tune (min, default, max)
net.ipv4.tcp_rmem = 4096 1048576 16777216
net.ipv4.tcp_wmem = 4096 1048576 16777216

# File d'attente RX du noyau (backlog global, pas TCP)
net.core.netdev_max_backlog = 16384

# -----------------------------------------------------------------------------
# TCP Hardening
# -----------------------------------------------------------------------------
# Nombre de retransmissions SYN/ACK (defaut 5 -> reduire pour liberer plus vite)
net.ipv4.tcp_synack_retries = 2

# Nombre de retransmissions SYN sortantes
net.ipv4.tcp_syn_retries = 2

# Recycler les sockets TIME_WAIT (utile sous forte charge)
net.ipv4.tcp_tw_reuse = 1

# Timeout keepalive (defaut 7200s = 2h, reduire sous charge)
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 60
net.ipv4.tcp_keepalive_probes = 5

# Nombre max de sockets orphelines (pas rattachees a un processus)
net.ipv4.tcp_max_orphans = 32768

# Desactiver les timestamps TCP si non necessaires (economie ~12 octets/paquet)
# ATTENTION : desactive aussi PAWS (Protection Against Wrapped Sequence numbers)
# Laisser active (1) sauf profil tres specifique.
net.ipv4.tcp_timestamps = 1

# Activer TCP SACK (Selective Acknowledgment) - recommande
net.ipv4.tcp_sack = 1

# -----------------------------------------------------------------------------
# Protection contre les debordements memoire
# -----------------------------------------------------------------------------
# Memoire TCP globale (pages) : pression, warning, max
# Adapter selon RAM totale du serveur
# net.ipv4.tcp_mem = 786432 1048576 1572864

# Nombre max de descripteurs de fichiers systeme
fs.file-max = 2097152

# Nombre max d'evenements inotify (si monitoring actif)
fs.inotify.max_user_watches = 524288
