# =============================================================================
# BRCloud FluxGate - NGINX Global Settings (inclure dans nginx.conf http {})
# =============================================================================
# Parametres globaux optimises pour la resilience anti-DDoS.
# Inclure dans /etc/nginx/nginx.conf au niveau du bloc http {}.
# =============================================================================

# --- Workers ---
# auto = un worker par coeur CPU
worker_processes auto;
worker_rlimit_nofile 65536;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # --- Types MIME ---
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Performance I/O ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # --- Keepalive (client) ---
    keepalive_timeout 30s;
    keepalive_requests 1000;

    # --- Reset les connexions en timeout (libere FD rapidement) ---
    reset_timedout_connection on;

    # --- Limiter la taille des headers (protection header flood) ---
    server_tokens off;

    # --- Logs ---
    access_log /var/log/nginx/access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # --- ModSecurity WAF (active par deploy.sh si modsecurity est installe) ---
    # modsecurity on;
    # modsecurity_rules_file /etc/modsecurity/modsecurity.conf;

    # --- Gzip (economie bande passante) ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # --- Inclure la config FluxGate ---
    include /etc/nginx/conf.d/fluxgate.conf;
}
