# =============================================================================
# BRCloud FluxGate - NGINX Reverse Proxy Anti-DDoS Configuration
# =============================================================================
# Rate limiting L7 (limit_req / limit_conn), timeouts anti-slow,
# backpressure avec HTTP 429, headers securite.
#
# Installation :
#   cp nginx-fluxgate.conf /etc/nginx/conf.d/fluxgate.conf
#   (ou inclure dans /etc/nginx/nginx.conf)
#   nginx -t && systemctl reload nginx
# =============================================================================

# =============================================================================
# IMPORTANT : Les directives limit_*_zone et map ci-dessous necessitent le
# contexte http {}. Elles sont definies ici car ce fichier est inclus via
# conf.d/ qui est charge dans le bloc http {} de nginx.conf.
# Si votre nginx.conf inclut conf.d/ dans un autre contexte, deplacer ces
# directives dans le bloc http {} de nginx.conf ou utiliser nginx-global.conf.
# =============================================================================

# --- OPTION CDN / REVERSE PROXY (Cloudflare, etc.) ---
# Si votre serveur est derriere Cloudflare, un CDN ou un proxy, decommenter et
# adapter les lignes ci-dessous pour extraire la vraie IP du visiteur.
# Sans cela, les rate-limits bloqueront toutes les requetes venant du CDN d'un coup.
#
# set_real_ip_from 103.21.244.0/22;   # IPs Cloudflare (exemple)
# set_real_ip_from 173.245.48.0/20;
# set_real_ip_from 127.0.0.1;         # Proxy local
# real_ip_header CF-Connecting-IP;   # ou X-Forwarded-For selon le proxy
# real_ip_recursive on;

# --- Zones de rate limiting ---
# Memoire partagee : 10m ~ 160 000 IP (binary_remote_addr = 4 octets IPv4)

# Limite de requetes par IP (leaky bucket)
limit_req_zone $binary_remote_addr zone=req_per_ip:10m rate=30r/s;

# Limite de connexions simultanees par IP
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# Limite globale de connexions au serveur
limit_conn_zone $server_name zone=conn_total:10m;

# --- Reponse 429 au lieu de 503 par defaut ---
limit_req_status 429;
limit_conn_status 429;

# --- Logging rate limit (optionnel, reduire en prod si trop verbeux) ---
limit_req_log_level warn;
limit_conn_log_level warn;

# --- Map pour detecter les User-Agent suspects (optionnel) ---
map $http_user_agent $bad_bot {
    default 0;
    "~*bot"        0;    # bots legitimes (Googlebot, etc.)
    ""             1;    # pas de User-Agent
    "~*curl"       0;    # monitoring
    "~*wget"       0;
    "~*python"     1;    # scripts automatises
    "~*Go-http"    1;
    "~*java"       1;
}

# =============================================================================
# Upstream (application locale)
# =============================================================================
upstream app_backend {
    server 127.0.0.1:8080;

    # Keepalive vers le backend pour eviter overhead connexion
    keepalive 64;
}

# =============================================================================
# Serveur HTTP (redirect vers HTTPS ou serveur principal)
# =============================================================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # --- Limite de connexions ---
    limit_conn conn_per_ip 50;
    limit_conn conn_total 10000;

    # --- Timeouts anti-slow (lecture headers/body du client) ---
    client_header_timeout 10s;
    client_body_timeout 10s;
    send_timeout 10s;

    # --- Taille max du body (eviter upload abuse) ---
    client_max_body_size 10m;

    # --- Buffers client (limiter memoire par connexion) ---
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_body_buffer_size 16k;

    # --- Headers securite ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Bloquer les bots suspects (optionnel) ---
    if ($bad_bot) {
        return 403;
    }

    # --- Page de status pour monitoring ---
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        allow ::1;
        deny all;
    }

    # --- Health check ---
    location /health {
        access_log off;
        return 200 "OK\n";
    }

    # --- Location principale avec rate limiting ---
    location / {
        # Rate limit : 30 req/s par IP, burst de 50, nodelay
        limit_req zone=req_per_ip burst=50 nodelay;

        proxy_pass http://app_backend;

        # --- Timeouts vers le backend ---
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 30s;

        # --- Headers proxy ---
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;

        # --- Buffers proxy (limiter memoire) ---
        proxy_buffer_size 4k;
        proxy_buffers 8 8k;
        proxy_busy_buffers_size 16k;
    }

    # --- Endpoints sensibles : rate limit plus strict ---
    location /api/login {
        limit_req zone=req_per_ip burst=5 nodelay;

        proxy_pass http://app_backend;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 15s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Pages d'erreur personnalisees ---
    error_page 429 /429.html;
    location = /429.html {
        internal;
        default_type text/html;
        return 429 '<!DOCTYPE html><html><head><title>429 Too Many Requests</title></head><body><h1>429 - Too Many Requests</h1><p>Vous avez envoye trop de requetes. Veuillez reessayer dans quelques instants.</p></body></html>';
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        internal;
        default_type text/html;
        return 503 '<!DOCTYPE html><html><head><title>Service Unavailable</title></head><body><h1>503 - Service Temporarily Unavailable</h1><p>Le service est temporairement indisponible. Veuillez reessayer.</p></body></html>';
    }
}

