# =============================================================================
# BRCloud FluxGate - Fail2ban Filter : Apache 4xx errors
# =============================================================================

[Definition]
failregex = ^<HOST> - .* "(GET|POST|HEAD|PUT|DELETE|PATCH) .* HTTP/.*" (400|401|403|404|405|408|429) .*$
ignoreregex = ^<HOST> - .* "(GET|POST) /health.*"
