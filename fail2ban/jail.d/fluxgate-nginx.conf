# =============================================================================
# BRCloud FluxGate - Fail2ban Jail : NGINX HTTP Abuse
# =============================================================================
# Detection des abus HTTP (erreurs repetees, scans, bots).
# Copier vers /etc/fail2ban/jail.d/fluxgate-nginx.conf
# =============================================================================

# --- Ban les IPs qui generent trop de 4xx ---
[nginx-4xx]
enabled  = true
port     = http,https
filter   = nginx-4xx
logpath  = /var/log/nginx/access.log
maxretry = 100
findtime = 60
bantime  = 600
banaction = nftables[type=allports]

# --- Ban les IPs qui se font rate-limiter (429) ---
[nginx-limit-req]
enabled  = true
port     = http,https
filter   = nginx-limit-req
logpath  = /var/log/nginx/error.log
maxretry = 30
findtime = 60
bantime  = 1800
banaction = nftables[type=allports]

# --- Ban les bots qui scannent des URLs inexistantes ---
[nginx-botsearch]
enabled  = true
port     = http,https
filter   = nginx-botsearch
logpath  = /var/log/nginx/access.log
maxretry = 20
findtime = 120
bantime  = 3600
banaction = nftables[type=allports]
