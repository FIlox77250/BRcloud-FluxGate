# =============================================================================
# BRCloud FluxGate - Fail2ban Jail : Apache HTTP Abuse
# =============================================================================
# Alternative a la config NGINX pour les serveurs Apache.
# Copier vers /etc/fail2ban/jail.d/fluxgate-apache.conf
# =============================================================================

# --- Ban les IPs qui generent trop de 4xx ---
[apache-4xx]
enabled  = true
port     = http,https
filter   = apache-4xx
logpath  = /var/log/apache2/access-timing.log
maxretry = 100
findtime = 60
bantime  = 600
banaction = nftables[type=allports]

# --- Ban les IPs avec erreurs auth ---
[apache-auth]
enabled  = true
port     = http,https
filter   = apache-auth
logpath  = /var/log/apache2/error.log
maxretry = 10
findtime = 300
bantime  = 1800
banaction = nftables[type=allports]

# --- Ban les bots qui scannent ---
[apache-botsearch]
enabled  = true
port     = http,https
filter   = apache-botsearch
logpath  = /var/log/apache2/access-timing.log
maxretry = 20
findtime = 120
bantime  = 3600
banaction = nftables[type=allports]
