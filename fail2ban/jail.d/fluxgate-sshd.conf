# =============================================================================
# BRCloud FluxGate - Fail2ban Jail : SSH
# =============================================================================
# Protection brute force SSH.
# Copier vers /etc/fail2ban/jail.d/fluxgate-sshd.conf
# =============================================================================

[sshd]
enabled  = true
port     = ssh
filter   = sshd
backend  = auto
logpath  = /var/log/auth.log
            /var/log/secure
maxretry = 5
findtime = 600
bantime  = 3600

# Action : bannir via nftables (set blocklist4)
# Adapter selon votre firewall (nftables ou iptables)
banaction = nftables[type=allports]
