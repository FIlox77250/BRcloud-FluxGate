# =============================================================================
# BRCloud FluxGate - Apache HTTP Server Anti-DDoS Configuration
# =============================================================================
# Protection contre les attaques slow request, limitation des ressources,
# timeouts stricts, headers securite.
#
# Installation :
#   cp security-hardening.conf /etc/apache2/conf-available/fluxgate-security.conf
#   a2enconf fluxgate-security
#   a2enmod reqtimeout headers
#   apachectl configtest && systemctl reload apache2
# =============================================================================

# --- mod_reqtimeout : protection contre les requetes lentes (slow HTTP) ---
# Ferme les connexions des clients trop lents a envoyer headers ou body.
# Format : header=<min>-<max>,MinRate=<bytes/sec> body=<min>-<max>,MinRate=<bytes/sec>
<IfModule reqtimeout_module>
    # Headers : 10s minimum, jusqu'a 40s si le client envoie au moins 500 octets/s
    # Body : 10s minimum, jusqu'a 60s si le client envoie au moins 500 octets/s
    RequestReadTimeout header=10-40,MinRate=500 body=10-60,MinRate=500
    LogLevel reqtimeout:info
</IfModule>

# --- Timeouts generaux ---
# Timeout global (secondes) pour une requete complete
Timeout 30

# Keepalive : limiter le nombre de requetes par connexion persistante
KeepAlive On
KeepAliveTimeout 5
MaxKeepAliveRequests 100

# --- Limiter les tailles de requete ---
# Taille max du body (10 Mo)
LimitRequestBody 10485760

# Nombre max de champs de header
LimitRequestFields 50

# Taille max d'un champ de header
LimitRequestFieldSize 8190

# Taille max de la ligne de requete (URI)
LimitRequestLine 8190

# --- MPM Event tuning (adapter selon RAM/CPU) ---
<IfModule mpm_event_module>
    # Nombre max de requetes simultanees
    MaxRequestWorkers 256

    # Threads par processus enfant
    ThreadsPerChild 25

    # Processus enfants de depart
    StartServers 4

    # Min/Max spare threads
    MinSpareThreads 25
    MaxSpareThreads 75

    # Nombre max de connexions par processus avant recyclage
    MaxConnectionsPerChild 10000

    # Duree d'attente d'une connexion de type async (event MPM)
    AsyncRequestWorkerFactor 2
</IfModule>

# --- Headers de securite ---
<IfModule headers_module>
    # Masquer la version Apache
    ServerTokens Prod
    ServerSignature Off

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set X-XSS-Protection "0"

    # Supprimer les headers revelateurs
    Header unset X-Powered-By
    Header unset Server
</IfModule>

# --- Desactiver les methodes HTTP non necessaires ---
<Directory />
    <LimitExcept GET POST HEAD>
        Require all denied
    </LimitExcept>
</Directory>

# --- Protection contre le directory listing ---
<Directory />
    Options -Indexes -FollowSymLinks
    AllowOverride None
    Require all denied
</Directory>

# --- Bloquer les User-Agent vides ---
<IfModule rewrite_module>
    RewriteEngine On
    RewriteCond %{HTTP_USER_AGENT} ^$ [NC]
    RewriteRule .* - [F,L]
</IfModule>

# --- Logging pour monitoring ---
LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" %D" combined_timing
CustomLog /var/log/apache2/access-timing.log combined_timing

# --- mod_status pour monitoring local ---
<IfModule status_module>
    <Location /server-status>
        SetHandler server-status
        Require ip 127.0.0.1 ::1
    </Location>
    ExtendedStatus On
</IfModule>

# --- Pages d'erreur personnalisees ---
ErrorDocument 429 "<!DOCTYPE html><html><body><h1>429 - Too Many Requests</h1><p>Veuillez reessayer dans quelques instants.</p></body></html>"
ErrorDocument 503 "<!DOCTYPE html><html><body><h1>503 - Service Temporarily Unavailable</h1></body></html>"
